name: Build and Release Chrome Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        default: 'manual-build'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: domain-volume-controller/package-lock.json

      - name: Install dependencies
        working-directory: ./domain-volume-controller
        run: npm ci

      - name: Run tests
        working-directory: ./domain-volume-controller
        run: npm test

      - name: Build extension
        working-directory: ./domain-volume-controller
        run: npm run build

      - name: Set version name
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.event.inputs.version || 'manual-build' }}" >> $GITHUB_OUTPUT
          fi

      - name: Create Chrome Web Store package
        working-directory: ./domain-volume-controller
        run: |
          cd dist
          zip -r ../domain-volume-controller-${{ steps.version.outputs.name }}.zip . \
            -x "*.map"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension-${{ steps.version.outputs.name }}
          path: domain-volume-controller/domain-volume-controller-${{ steps.version.outputs.name }}.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: domain-volume-controller/domain-volume-controller-${{ steps.version.outputs.name }}.zip
          draft: false
          prerelease: false
          generate_release_notes: true
