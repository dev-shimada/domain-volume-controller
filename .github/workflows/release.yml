name: Build and Release Chrome Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: domain-volume-controller/package-lock.json

      - name: Install dependencies
        working-directory: ./domain-volume-controller
        run: npm ci

      - name: Run tests
        working-directory: ./domain-volume-controller
        run: npm test

      - name: Build extension
        working-directory: ./domain-volume-controller
        run: npm run build

      - name: Create Chrome Web Store package
        working-directory: ./domain-volume-controller
        run: |
          cd dist
          # Remove development files from icons directory if they exist
          rm -f icons/README.md icons/create_icons.sh
          # Create zip file excluding unnecessary files
          zip -r ../domain-volume-controller-${{ github.ref_name }}.zip . \
            -x "*.map" \
            -x "*.md" \
            -x "*.sh"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: domain-volume-controller/domain-volume-controller-${{ github.ref_name }}.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: domain-volume-controller/domain-volume-controller-${{ github.ref_name }}.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
