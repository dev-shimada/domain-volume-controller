name: Build and Release Chrome Extension

on:
  pull_request:
    types:
      - closed
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        default: 'manual-build'

jobs:
  build:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       startsWith(github.event.pull_request.head.ref, 'bump-version/'))
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: domain-volume-controller/package-lock.json

      - name: Install dependencies
        working-directory: ./domain-volume-controller
        run: npm ci

      - name: Run tests
        working-directory: ./domain-volume-controller
        run: npm test

      - name: Build extension
        working-directory: ./domain-volume-controller
        run: npm run build

      - name: Set version name
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # Extract version from branch name: bump-version/v1.2.3 -> v1.2.3
            branch="${{ github.event.pull_request.head.ref }}"
            echo "name=${branch#bump-version/}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.event.inputs.version || 'manual-build' }}" >> $GITHUB_OUTPUT
          fi

      - name: Create Chrome Web Store package
        working-directory: ./domain-volume-controller
        run: |
          cd dist
          zip -r ../domain-volume-controller-${{ steps.version.outputs.name }}.zip . \
            -x "*.map"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension-${{ steps.version.outputs.name }}
          path: domain-volume-controller/domain-volume-controller-${{ steps.version.outputs.name }}.zip

      - name: Create Release
        if: github.event_name == 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.name }}
          files: domain-volume-controller/domain-volume-controller-${{ steps.version.outputs.name }}.zip
          draft: false
          prerelease: false
          generate_release_notes: true
